<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOO помочь закодировать Ваню</title>
    <style>
        /* Загальні стилі темної теми */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* Контейнер для зображень */
        .image-container {
            margin-bottom: 40px;
            border: 2px dashed #444;
            padding: 10px;
            border-radius: 15px;
            max-width: 100%;
        }

        img { 
        
            max-width: 400px;
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        /* Стилі для кнопок */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            /* Градієнт на клавішах */
            background: linear-gradient(135deg, #6e8efb, #a777e3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(167, 119, 227, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        /* Окремий градієнт для преміум-кнопки */
        .btn-premium {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Стилі для плашки (модального вікна) */
        #notification {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #a777e3;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            text-align: center;
            z-index: 1000;
        }

        #notification h2 {
            margin: 0 0 20px 0;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
        }

        .close-btn {
            background: #444;
            margin-top: 15px;
            padding: 8px 20px;
        }
    </style>
</head>
<body>

    <h1>OOO помочь закодировать Ваню</h1>
         
    <div class="image-container">
        <!-- Сюди можна вставити посилання на фото -->
        <img src="photo_5193076959854925068_y.jpg" alt="Вставте фото тут">
    </div>

    <div class="button-group">
        <button onclick="showAlert('Вітаємо, Ваня закодований')">ТАК</button>
        <button onclick="showAlert('Вітаємо, Ваня закодований')">ТАК</button>
        <button class="btn-premium" onclick="showAlert('Хтота риля хоче придбати преміум?')">ПРИДБАТИ ПРЕМІУМ</button>
    </div>

    <!-- Плашка -->
    <div id="overlay" class="overlay" onclick="closeAlert()"></div>
    <div id="notification">
        <h2 id="message"></h2>
        <button class="close-btn" onclick="closeAlert()">Закрити</button>
    </div>

    <script>
        function showAlert(text) {
            document.getElementById('message').innerText = text;
            document.getElementById('notification').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAlert() {
            document.getElementById('notification').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>

</body>
</html>
